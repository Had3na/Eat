name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  poc-tests:
    name: POC — moteur de recettes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poc
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: npm test

      - name: Run demo (smoke check)
        run: npm run demo
