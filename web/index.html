<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>NÉON CUISINE</title>

  <!-- PWA : installable sur l'ecran d'accueil (Android/iOS) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Néon Cuisine" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" id="app"></main>

  <!-- Moteur partage avec le POC (UMD -> window.NeonEngine) -->
  <script src="../poc/engine.js"></script>
  <!-- Base de recettes (generee depuis poc/data/recipes.json) -->
  <script src="recipes.data.js"></script>
  <!-- Application -->
  <script src="app.js"></script>

  <!-- Service worker : mode hors-ligne -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
